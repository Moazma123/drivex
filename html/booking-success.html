<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Booking Successful — DrivEx</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <style>
        body {
            background: var(--bg);
            min-height: 100vh;
        }
    </style>
</head>

<body class="d-flex align-items-center" style="min-height:100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card-soft p-5 text-center">
                    <a class="navbar-brand mb-4 d-inline-block" href="index.html"><i class="bi bi-car-front-fill text-primary-brand"></i> Driv<span class="text-primary-brand">eX</span></a>
                    <div class="mx-auto mb-3" style="width:80px;height:80px;border-radius:50%;background:var(--success-bg);display:flex;align-items:center;justify-content:center;">
                        <i class="bi bi-check-lg text-success" style="font-size:2.5rem;"></i>
                    </div>
                    <h3 class="fw-bold">Booking Successful!</h3>
                    <p class="text-muted-soft">Thank you for your booking. Your reservation has been confirmed.</p>

                    <div class="card-soft p-3 text-start mt-3" style="background:var(--bg);">
                        <div class="d-flex justify-content-between small py-1"><span class="text-muted-soft">Booking ID</span><span class="fw-bold" id="okBookingId">—</span></div>
                        <div class="d-flex justify-content-between small py-1"><span class="text-muted-soft">Car</span><span class="fw-bold" id="okCarName">—</span></div>
                        <div class="d-flex justify-content-between small py-1"><span class="text-muted-soft">Pick-up Date</span><span class="fw-bold" id="okPickup">—</span></div>
                        <div class="d-flex justify-content-between small py-1"><span class="text-muted-soft">Return Date</span><span class="fw-bold" id="okReturn">—</span></div>
                        <div class="d-flex justify-content-between small py-1"><span class="text-muted-soft">Total Amount</span><span class="fw-bold text-primary-brand" id="okAmount">—</span></div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <a href="#" id="okInvoiceLink" class="btn btn-brand w-100"><i class="bi bi-download"></i> Download Invoice</a>
                        <a href="index.html" class="btn btn-brand-outline w-100">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/cars-data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const id = Util.qs("id");
            const booking = id ? Bookings.getById(id) : null;
            if (!booking) {
                document.getElementById("okBookingId").textContent = "N/A";
                return;
            }
            document.getElementById("okBookingId").textContent = booking.id;
            document.getElementById("okCarName").textContent = booking.carName;
            document.getElementById("okPickup").textContent = Util.formatDate(booking.pickup);
            document.getElementById("okReturn").textContent = Util.formatDate(booking.ret);
            document.getElementById("okAmount").textContent = Util.money(booking.amount);
            document.getElementById("okInvoiceLink").href = "invoice.html?id=" + booking.id;
        });
    </script>
</body>

</html>
