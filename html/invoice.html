<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Invoice — DrivEx</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <style>
        @media print {
            nav,
            footer,
            #backBtn,
            #downloadBtn {
                display: none !important;
            }
            body {
                background: #fff;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-drivex">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-car-front-fill text-primary-brand"></i> Driv<span>eX</span></a>
            <a href="my-bookings.html" class="btn btn-brand-outline ms-auto btn-sm" id="backBtn"><i class="bi bi-arrow-left"></i> Back to Bookings</a>
        </div>
    </nav>

    <div class="container py-4">
        <div class="card-soft p-4 mx-auto" style="max-width:800px;">
            <div class="d-flex justify-content-between align-items-start mb-4">
                <div>
                    <h4 class="fw-bold mb-0"><i class="bi bi-car-front-fill text-primary-brand"></i> DrivEx</h4>
                    <p class="text-muted-soft small mb-0">Invoice</p>
                </div>
                <div class="text-end">
                    <h6 class="fw-bold mb-1" id="invNumber">#INV-000000</h6>
                    <button class="btn btn-brand-soft btn-sm" id="downloadBtn"><i class="bi bi-download"></i> Download</button>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <p class="text-muted-soft small mb-1 fw-semibold">Bill To:</p>
                    <p class="mb-0 fw-semibold" id="billToName">—</p>
                    <p class="mb-0 small text-muted-soft" id="billToAddress">—</p>
                    <p class="mb-0 small text-muted-soft" id="billToCity">—</p>
                    <p class="mb-0 small text-muted-soft" id="billToEmail">—</p>
                    <p class="mb-0 small text-muted-soft" id="billToPhone">—</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <div class="d-flex justify-content-between justify-content-md-end gap-3 small py-1"><span class="text-muted-soft">Invoice Date</span><span class="fw-semibold" id="invDate">—</span></div>
                    <div class="d-flex justify-content-between justify-content-md-end gap-3 small py-1"><span class="text-muted-soft">Booking ID</span><span class="fw-semibold" id="invBookingId">—</span></div>
                    <div class="d-flex justify-content-between justify-content-md-end gap-3 small py-1"><span class="text-muted-soft">Payment Method</span><span class="fw-semibold" id="invPayMethod">—</span></div>
                    <div class="d-flex justify-content-between justify-content-md-end gap-3 small py-1"><span class="text-muted-soft">Payment Status</span><span class="status-badge status-paid" id="invPayStatus">Paid</span></div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-drivex">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Description</th>
                            <th class="text-end">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="invLineItems"></tbody>
                </table>
            </div>
            <div class="d-flex justify-content-end">
                <div style="min-width:220px;">
                    <div class="d-flex justify-content-between py-1"><span class="text-muted-soft">Total Amount</span><span class="fw-bold fs-5 text-primary-brand" id="invTotal">$0</span></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer mt-3 py-4 text-center">
        <div class="container">
            <p class="small mb-0">© 2024 DrivEx. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/cars-data.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/invoice.js"></script>
</body>

</html>
