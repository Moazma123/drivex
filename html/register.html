<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Create Account — DrivEx</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row card-soft overflow-hidden mx-auto" style="max-width:900px;">
            <div class="col-md-5 d-none d-md-block p-0">
                <div class="auth-visual h-100 p-4 d-flex flex-column justify-content-between">
                    <a class="navbar-brand text-white" href="index.html"><i class="bi bi-car-front-fill"></i> Driv<span style="color:#c4b5fd;">eX</span></a>
                    <img src="../images/BMW-3.png" class="img-fluid" style="filter:drop-shadow(0 10px 20px rgba(0,0,0,.3));">
                    <p class="text-white-50 small mb-0">Join thousands of happy travelers.</p>
                </div>
            </div>
            <div class="col-md-7">
                <div class="auth-card">
                    <h4 class="fw-bold mb-1">Create Account</h4>
                    <p class="text-muted-soft mb-4">Join us and start your journey</p>
                    <form class="row g-3" id="registerForm" novalidate>
                        <div class="col-12">
                            <label class="form-label">Full Name</label>
                            <input class="form-control" id="regName" placeholder="John Doe" required>
                            <div class="invalid-feedback">Please enter your name.</div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="regEmail" placeholder="john.doe@email.com" required>
                            <div class="invalid-feedback">Please enter a valid email address.</div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Phone Number</label>
                            <input class="form-control" id="regPhone" placeholder="+1 234 567 8900" required>
                            <div class="invalid-feedback">Please enter a valid phone number.</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="regPassword" placeholder="••••••••" required minlength="6">
                            <div class="invalid-feedback">Minimum 6 characters.</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="regConfirm" placeholder="••••••••" required>
                            <div class="invalid-feedback">Passwords do not match.</div>
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="agree3" required>
                                <label class="form-check-label small" for="agree3">I agree to <a href="#" class="text-primary-brand">Terms &amp; Conditions</a></label>
                                <div class="invalid-feedback">You must agree before continuing.</div>
                            </div>
                        </div>
                        <div class="col-12"><button type="submit" class="btn btn-brand w-100 py-2">Register</button></div>
                        <p class="text-center small text-muted-soft mb-0">Already have an account? <a href="login.html" class="text-primary-brand fw-semibold">Login</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/cars-data.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/register.js"></script>
</body>

</html>
