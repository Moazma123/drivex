<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title id="pageTitle">Car Details — DrivEx</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-drivex">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-car-front-fill text-primary-brand"></i> Driv<span>eX</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav1"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="nav1">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="vehicles.html">Vehicles</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                </ul>
                <div id="navAuthSlot" class="d-flex align-items-center"></div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <nav class="small text-muted-soft mb-3">
            <a href="index.html" class="text-muted-soft">Home</a> / <a href="vehicles.html" class="text-muted-soft">Vehicles</a> / <span class="text-primary-brand" id="crumbCarName">Car Details</span>
        </nav>

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card-soft p-4 text-center mb-3">
                    <img src="../images/BMW-3.png" class="img-fluid" style="max-height:280px;" id="mainCarImg" alt="Car">
                </div>
                <div class="row g-2">
                    <div class="col-4">
                        <div class="card-soft p-2 text-center"><img src="../images/BMW-3.png" style="height:60px;"></div>
                    </div>
                    <div class="col-4">
                        <div class="card-soft p-2 text-center"><img src="../images/BMW-3.png" style="height:60px;"></div>
                    </div>
                    <div class="col-4">
                        <div class="card-soft p-2 text-center"><img src="../images/BMW-3.png" style="height:60px;"></div>
                    </div>
                </div>

                <div class="card-soft p-4 mt-4">
                    <h5 class="fw-bold">About car</h5>
                    <p class="text-muted-soft mb-0" id="aboutCarText">Loading car details...</p>
                </div>

                <div class="card-soft p-4 mt-4">
                    <h5 class="fw-bold mb-3">Features</h5>
                    <div class="row g-2" id="featuresGrid"></div>
                </div>

                <h5 class="fw-bold mt-4 mb-3">Other Cars</h5>
                <div class="row g-3" id="otherCarsGrid"></div>
            </div>

            <div class="col-lg-5">
                <div class="card-soft p-4" style="position:sticky;top:1rem;">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h4 class="fw-bold mb-1" id="carName">—</h4>
                            <div class="text-warning small mb-2"><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i class="bi bi-star-half"></i> <span class="text-muted-soft" id="carRatingText">— (— Reviews)</span></div>
                        </div>
                    </div>
                    <div class="car-price fs-3" id="carPriceText">$0 <small>/day</small></div>

                    <hr>
                    <div class="row g-3 small">
                        <div class="col-6"><i class="bi bi-people-fill text-primary-brand"></i> <span id="specSeats">—</span> Seats</div>
                        <div class="col-6"><i class="bi bi-gear-fill text-primary-brand"></i> <span id="specTrans">—</span></div>
                        <div class="col-6"><i class="bi bi-snow2 text-primary-brand"></i> AC</div>
                        <div class="col-6"><i class="bi bi-fuel-pump-fill text-primary-brand"></i> <span id="specFuel">—</span></div>
                        <div class="col-6"><i class="bi bi-door-closed-fill text-primary-brand"></i> <span id="specDoors">—</span> Doors</div>
                        <div class="col-6"><i class="bi bi-bag-fill text-primary-brand"></i> <span id="specLuggage">—</span> Luggage</div>
                        <div class="col-6"><i class="bi bi-person-badge-fill text-primary-brand"></i> Min Age <span id="specMinAge">—</span></div>
                    </div>
                    <button class="btn btn-brand w-100 mt-4" id="bookNowBtn">Book Now</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer mt-5 py-4 text-center">
        <div class="container">
            <p class="small mb-0">© 2026 DrivEx. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/cars-data.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/car-details.js"></script>
</body>

</html>
