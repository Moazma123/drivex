<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — DrivEx</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="../css/style.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: #f8f9fa;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row card-soft overflow-hidden mx-auto" style="max-width:900px;">

            <!-- Left Side -->
            <div class="col-md-5 d-none d-md-block p-0">
                <div class="auth-visual h-100 p-4 d-flex flex-column justify-content-between">

                    <a class="navbar-brand text-white" href="index.html">
                        <i class="bi bi-car-front-fill"></i> Driv
                        <span style="color:#c4b5fd;">eX</span>
                    </a>

                    <img src="../images/BMW-3.png" class="img-fluid" alt="BMW">

                    <p class="text-white-50 small mb-0">
                        Drive your journey forward with DrivEx.
                    </p>

                </div>
            </div>

            <!-- Right Side -->
            <div class="col-md-7">

                <div class="auth-card">

                    <h4 class="fw-bold mb-1">Welcome Back!</h4>
                    <p class="text-muted-soft mb-4">Login to your account</p>

                    <form id="loginForm" novalidate>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>

                            <input type="email" class="form-control" id="loginEmail" placeholder="john.doe@email.com" required>

                            <div class="invalid-feedback">
                                Please enter a valid email address.
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>

                            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>

                            <div class="invalid-feedback">
                                Please enter your password.
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mb-3">

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">

                                <label class="form-check-label small" for="remember">
                                Remember Me
                            </label>
                            </div>

                            <a href="#" class="small text-primary-brand">
                            Forgot Password?
                        </a>

                        </div>

                        <button type="submit" class="btn btn-brand w-100 py-2">
                        Login
                    </button>

                        <p class="text-center small text-muted-soft mt-3 mb-0">
                            Demo Account
                        </p>

                        <p class="text-center small">
                            <strong>Email:</strong> john.doe@email.com
                            <br>
                            <strong>Password:</strong> password123
                        </p>

                        <p class="text-center small mt-3">
                            Don't have an account?
                            <a href="register.html" class="text-primary-brand fw-semibold">
                            Register
                        </a>
                        </p>

                    </form>

                </div>

            </div>

        </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Project JS -->
    <script src="../js/cars-data.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/login.js"></script>

</body>

</html>
